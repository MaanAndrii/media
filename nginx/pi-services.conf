# /etc/nginx/sites-available/pi-services
# Єдина точка входу для трьох сервісів на Raspberry Pi 5.
#
#   /                  -> хаб-сторінка (/var/www/hub/index.html)
#   /public/, /admin/  -> ainewswriter (PHP, рідні шляхи проєкту)
#   /api/*             -> ainewswriter через фронт-контролер index.php
#   /wm/               -> watermarker-pro (Streamlit, reverse proxy + WebSocket)
#   /health/*          -> same-origin проксі для статус-індикаторів хаба
#
# newsmon свідомо НЕ за проксі: його фронтенд використовує абсолютні
# шляхи /api/..., які конфліктують із PHP-маршрутами ainewswriter.
# Він доступний напряму на порту 8000 (див. DEPLOY.md).

server {
    listen 80 default_server;
    server_name _;

    root /var/www/ainewswriter;
    index index.php;

    # ---- Хаб (проміжний інтерфейс) ----
    location = / {
        root /var/www/hub;
        try_files /index.html =404;
    }

    # ---- Кеш статики ainewswriter ----
    location /public/assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---- ainewswriter: усе невідоме -> фронт-контролер index.php ----
    # ВАЖЛИВО: саме /index.php, а не =404 — інакше "гарні" URL
    # (/api/job_submit, /api/settings тощо) повертатимуть 404.
    location / {
        try_files $uri $uri/ /index.php;
    }

    # ---- PHP через php-fpm ----
    # ВАЖЛИВО: версія сокета має збігатися з реальною. Перевір: ls /run/php/
    # fastcgi_read_timeout 300 — для AI-моделей із довгою відповіддю,
    # інакше nginx поверне 504 ще до завершення генерації.
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # ---- Блокування службових файлів ----
    location ~* \.(env|log|md)$ {
        deny all;
    }

    # ---- watermarker-pro (Streamlit потребує WebSocket) ----
    location /wm/ {
        proxy_pass http://127.0.0.1:8501/wm/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        client_max_body_size 500m;   # пакетне завантаження зображень
    }

    # ---- sysapi (управління сервісами, авторизація через X-Token) ----
    location /sysapi/ {
        proxy_pass http://127.0.0.1:8502/sysapi/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 310s;
    }

    # ---- Health-ендпоінти для хаба (same-origin, без CORS) ----
    location = /health/news {
        proxy_pass http://127.0.0.1:8000/api/monitor/status;
        proxy_connect_timeout 2s;
        proxy_read_timeout 3s;
    }

    location = /health/wm {
        proxy_pass http://127.0.0.1:8501/wm/_stcore/health;
        proxy_connect_timeout 2s;
        proxy_read_timeout 3s;
    }

    location = /health/writer {
        root /var/www/ainewswriter;
        try_files /public/newswriter.html =404;
    }
}
